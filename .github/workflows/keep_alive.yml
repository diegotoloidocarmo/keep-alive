name: Keep Alive - Simples Nacional

  on:
    schedule:
      - cron: '0,30 * * * *'
    workflow_dispatch:

  jobs:
    wake:
      runs-on: ubuntu-latest
      steps:
        - name: Wake Streamlit App
          run: |
            pip install playwright
            playwright install chromium --with-deps
            python3 - <<'EOF'
            from playwright.sync_api import sync_playwright

            with sync_playwright() as p:
                browser = p.chromium.launch()
                page = browser.new_page()
                page.goto('https://simples-nacional.streamlit.app', timeout=60000)
                try:
                    btn = page.get_by_text('Yes, get this app back up!')
                    if btn.is_visible():
                        btn.click()
                        print('App dormindo - acordando...')
                        page.wait_for_timeout(20000)
                    else:
                        print('App ja esta no ar.')
                except:
                    print('App rodando normalmente.')
                browser.close()
            EOF
