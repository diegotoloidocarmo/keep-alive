name: Keep Alive

  on:
    schedule:
      - cron: "0,30 * * * *"
    workflow_dispatch:

  jobs:
    wake:
      runs-on: ubuntu-latest
      steps:
        - name: Wake Streamlit App
          run: |
            pip install playwright
            playwright install chromium --with-deps
            python3 -c 'from playwright.sync_api import sync_playwright; p = sync_playwright().start(); b = p.chromium.launch(); pg = b.new_page();
  pg.goto("https://simples-nacional.streamlit.app", timeout=60000); btn = pg.query_selector("text=Yes, get this app back up!"); btn.click() if btn
  else None; pg.wait_for_timeout(20000) if btn else None; print("Acordado!" if btn else "Ja estava no ar."); b.close(); p.stop()'
